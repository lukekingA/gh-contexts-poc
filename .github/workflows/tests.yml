name: tests

on:
  push:
    branches-ignore:
      - main
      - dev

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install pytest
        run: pip install pytest

      - name: run tests
        run: pytest tests/
